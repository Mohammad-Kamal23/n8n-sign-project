services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n_core
    user: root
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=development
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Amman
      - N8N_USER_FOLDER=/home/node/.n8n 
      - N8N_RESTRICT_FILE_ACCESS_TO=/
      - N8N_BLOCK_FS_WRITE_ACCESS=false
      # --- THE ULTIMATE UNLOCK KEYS ---
      - N8N_BLOCK_COMMAND_EXECUTION=false
      - N8N_COMMAND_EXEC_ENABLED=true
      - N8N_ENABLE_UNSAFE_CORE_NODES=true
      - N8N_NODES_INCLUDE=["n8n-nodes-base.executeCommand","n8n-nodes-base.httpRequest","n8n-nodes-base.postgres","n8n-nodes-base.gmail"]
      - NODES_EXCLUDE=[]
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./simulated_cloud:/home/node/simulated_cloud
    networks:
      - signage_network

  fastapi:
    build: ./backend
    container_name: signage_api
    restart: always
    # ==========================================
    # GPU ACCELERATION BRIDGE (RTX 3050)
    # ==========================================
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # ==========================================
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./security_ops:/app/security_ops
      # FIX: Mount it to /home/node/... so it perfectly matches n8n
      - ./simulated_cloud:/home/node/simulated_cloud
    networks:
      - signage_network
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: signage_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secretpassword
      - POSTGRES_DB=signage_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - signage_network

  ui:
    build: ./ui
    container_name: signage_ui
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    networks:
      - signage_network

volumes:
  n8n_data:
  postgres_data:

networks:
  signage_network:
    driver: bridge